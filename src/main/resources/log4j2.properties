#Name of the Properties file
name=LoggerConfigFile

# 1. Root Logger must point to the appenders to show output
rootLogger.level=INFO
rootLogger.appenderRef.stdout.ref=ConsoleAppender

# 2. Package-specific Loggers
logger.file.name=com.glosport.utility
logger.file.level=INFO
logger.file.appenderRef.file.ref=FileAppender
logger.file.additivity=false

logger.console.name=com.glosport
logger.console.level=INFO
logger.console.appenderRef.stdout.ref=ConsoleAppender
logger.console.additivity=false

# 3. Appender Definitions
appender.console.type=Console
appender.console.name=ConsoleAppender
appender.console.layout.type=PatternLayout
appender.console.layout.pattern=%m%n

appender.file.type=File
appender.file.name=FileAppender
appender.file.fileName=log/FileLog.log
appender.file.layout.type=PatternLayout
appender.file.layout.pattern=%d{dd-MMM-yyyy HH:mm:ss} %level - %m%n